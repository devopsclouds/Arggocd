apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: sample-app
  namespace: argocd

  annotations:
    argocd-image-updater.argoproj.io/image-list: sample-app=docker89781/sample-app

    argocd-image-updater.argoproj.io/sample-app.update-strategy: newest-build

    argocd-image-updater.argoproj.io/sample-app.allow-tags: regexp:^[0-9]+$


    argocd-image-updater.argoproj.io/write-back-method: git

    argocd-image-updater.argoproj.io/sample-app.force-update: "true"

spec:
  project: default

  source:
    repoURL: https://github.com/devopsclouds/k8-manifests.git
    targetRevision: main
    path: sampleapp

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
